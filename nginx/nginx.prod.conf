server {
    listen 80;
    server_name rosterroyals.com www.rosterroyals.com;
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name rosterroyals.com www.rosterroyals.com;
    
    ssl_certificate /etc/letsencrypt/live/rosterroyals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rosterroyals.com/privkey.pem;
    
    # Frontend
    location / {
        proxy_pass http://react-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # React static files
    location /static/js/ {
        proxy_pass http://react-app:3000/static/js/;
    }
    
    location /static/css/ {
        proxy_pass http://react-app:3000/static/css/;
    }
    
    location /static/media/ {
        proxy_pass http://react-app:3000/static/media/;
    }
    
    # Backend API
    location /api/ {
        proxy_pass http://django-web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers - Update to match Django settings
        add_header Access-Control-Allow-Origin 'https://rosterroyals.com';
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, X-CSRFToken";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Expose-Headers "Content-Type, X-CSRFToken";
        
        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://rosterroyals.com';
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, X-CSRFToken";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Expose-Headers "Content-Type, X-CSRFToken";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Backend static files and media
    location /api/static/ {
        alias /app/static/;
    }
    
    location /media/ {
        alias /app/media/;
    }
}