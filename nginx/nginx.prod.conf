server {
    listen 80;
    server_name rosterroyals.com www.rosterroyals.com;
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name rosterroyals.com www.rosterroyals.com;
    
    ssl_certificate /etc/letsencrypt/live/rosterroyals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rosterroyals.com/privkey.pem;
    
    # Frontend
    location / {
        proxy_pass http://react-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # React static files
    location /static/js/ {
        proxy_pass http://react-app:3000/static/js/;
        proxy_set_header Host $host;
    }
    
    location /static/css/ {
        proxy_pass http://react-app:3000/static/css/;
        proxy_set_header Host $host;
    }
    
    location /static/media/ {
        proxy_pass http://react-app:3000/static/media/;
        proxy_set_header Host $host;
    }
    
    # Backend API - CRITICAL FIX
    location /api/ {
        # Remove trailing slash to avoid redirect loops
        rewrite ^/(.*)/$ /$1 break;
        
        proxy_pass http://django-web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin '*';
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization";
        
        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
    
    # Backend static files and media
    location /api/static/ {
        alias /app/static/;
    }
    
    location /media/ {
        alias /app/media/;
    }
}